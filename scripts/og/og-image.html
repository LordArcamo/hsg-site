<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
@font-face {
  font-family: 'Libre Franklin Variable';
  font-style: normal;
  font-weight: 100 900;
  src: url('../../node_modules/@fontsource-variable/libre-franklin/files/libre-franklin-latin-wght-normal.woff2') format('woff2-variations');
}
@font-face {
  font-family: 'Manrope Variable';
  font-style: normal;
  font-weight: 200 800;
  src: url('../../node_modules/@fontsource-variable/manrope/files/manrope-latin-wght-normal.woff2') format('woff2-variations');
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:1200px; height:630px; overflow:hidden; }
body {
  position:relative;
  background: linear-gradient(135deg, #191026 0%, #2c1c49 55%, #5b3296 100%);
  font-family: 'Manrope Variable', sans-serif;
}
.glow {
  position:absolute; top:-220px; right:-160px; width:900px; height:900px; border-radius:50%;
  background: radial-gradient(circle, rgba(232,175,8,0.24) 0%, rgba(232,175,8,0) 70%);
}
.ring-lg { position:absolute; right:-140px; bottom:-170px; width:520px; height:520px; border-radius:50%; border:2px solid rgba(255,255,255,0.07); }
.ring-sm { position:absolute; left:-50px; bottom:50px; width:230px; height:230px; border-radius:50%; border:1.5px solid rgba(255,255,255,0.05); }

.content { position:relative; padding: 90px 90px 0; }

.brand { display:flex; align-items:center; gap:24px; }
.brand-mark {
  width:96px; height:96px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  border: 7px solid #48a536;
  border-left-color:#5b3296; border-bottom-color:#5b3296;
  background:#fffdf8;
  box-shadow: 0 18px 40px rgba(0,0,0,0.28);
}
.brand-mark span { font-family:'Libre Franklin Variable', sans-serif; font-weight:800; font-size:46px; color:#5b3296; transform: translateY(-2px); }
.brand-word { font-family:'Libre Franklin Variable', sans-serif; font-weight:800; font-size:38px; color:#fff; letter-spacing:-0.01em; }
.brand-sub { font-family:'Manrope Variable', sans-serif; font-weight:700; font-size:15px; letter-spacing:0.2em; text-transform:uppercase; color:#e8af08; margin-top:9px; }

.tagline { margin-top: 90px; font-family:'Libre Franklin Variable', sans-serif; font-weight:800; font-size:70px; line-height:1.1; letter-spacing:-0.01em; color:#fff; }
.tagline .accent { color:#e8af08; display:block; }

.support { margin-top:28px; font-family:'Manrope Variable', sans-serif; font-weight:600; font-size:21px; color:rgba(255,255,255,0.72); }

.strip { position:absolute; left:0; right:0; bottom:0; height:16px; background:linear-gradient(90deg,#48a536,#159bd8,#5b3296,#e8af08,#ff6a28); }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="ring-lg"></div>
  <div class="ring-sm"></div>
  <div class="content">
    <div class="brand">
      <div class="brand-mark"><span>S</span></div>
      <div>
        <div class="brand-word">Schlager Solutions Group</div>
        <div class="brand-sub">Business Advisory &middot; New Jersey</div>
      </div>
    </div>
    <div class="tagline">The Right Decisions<span class="accent">Change Everything.</span></div>
    <div class="support">Strategy &middot; Executive Recruiting &middot; Leadership &middot; HR &middot; Executive Careers</div>
  </div>
  <div class="strip"></div>
</body>
</html>
